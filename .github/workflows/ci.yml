name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          pkg-config \
          git
    
    - name: Cache libraries
      uses: actions/cache@v3
      with:
        path: |
          libs/
          .obj/
          .dep/
        key: ${{ runner.os }}-libs-${{ hashFiles('Makefile') }}
        restore-keys: |
          ${{ runner.os }}-libs-
    
    - name: Build libraries
      run: |
        make check_libs
        make check_gtest
    
    - name: Build project
      run: make all
    
    - name: Run tests
      run: make test
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: |
          run_tests
          *.log