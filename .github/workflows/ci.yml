name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libsdl2-dev \
          libsdl2-ttf-dev \
          libsdl2-mixer-dev \
          libncurses-dev \
          pkg-config \
          git
    
    - name: Cache libraries
      uses: actions/cache@v4
      with:
        path: |
          libs/SDL2
          libs/SDL_ttf
          libs/SDL_mixer
          libs/raylib
          libs/ncurses
          libs/googletest
        key: ${{ runner.os }}-libs-${{ hashFiles('Makefile') }}-v2
        restore-keys: |
          ${{ runner.os }}-libs-
    
    - name: Build libraries
      run: |
        make check_libs
        make check_gtest
    
    - name: Verify SDL2 installation
      run: |
        ls -la libs/SDL2/ || echo "SDL2 not in libs/"
        ls -la libs/SDL2/include/ || echo "SDL2 include not found"
        ls -la libs/SDL2/build/ || echo "SDL2 build not found"
    
    - name: Build project
      run: make all
    
    - name: Run tests
      run: make test
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          run_tests
          *.log